name: Sync extraction sheet

on:
  schedule:
    - cron: "0 9,15,21 * * *"   # 12:00 / 18:00 / 00:00 Moscow
  workflow_dispatch:

concurrency:
  group: sync-sheet

env:
  SHEET_ID: 1DLy4sODN_CVouNW_ZjWSlcnutxhzIb0T7QUnZlEo08o
  GID: "1681120974"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download sheet
        run: |
          set -euo pipefail
          curl -sfL --retry 3 --retry-delay 5 \
            "https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}" \
            -o /tmp/raw.csv
          head -c 200 /tmp/raw.csv | grep -qi "<html" && \
            { echo "FATAL: got HTML, not CSV — sheet sharing is probably not public."; exit 1; }
          test -s /tmp/raw.csv

      - name: Validate + normalize
        env:
          SORT_KEY: Paper_ID
          REQUIRED_COLS: Paper_ID,Title,Screening_Stage,Screening_Status
          SKIP_ID_PREFIX: P000-EXAMPLE
        run: python3 scripts/normalize_csv.py /tmp/raw.csv data/papers.csv

      - name: Commit if changed
        run: |
          set -euo pipefail
          git config user.name  "slr-sync[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/papers.csv
          git diff --staged --quiet && { echo "No changes."; exit 0; }

          STAT=$(git diff --staged --numstat -- data/papers.csv)
          ADD=$(echo "$STAT" | cut -f1); DEL=$(echo "$STAT" | cut -f2)
          TOTAL=$(( $(wc -l < data/papers.csv) - 1 ))

          git commit \
            -m "data(slr): sync extraction sheet (+${ADD}/-${DEL} lines)" \
            -m "Records after sync: ${TOTAL}" \
            -m "Source: https://docs.google.com/spreadsheets/d/${SHEET_ID} (gid ${GID})" \
            -m "Fetched: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            -m "Automated export. Do not edit data/papers.csv by hand — edit the sheet."
          git push
